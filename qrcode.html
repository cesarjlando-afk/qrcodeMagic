<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- 👇 ESSA LINHA É A PRINCIPAL PARA FICAR GRANDE 👇 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Gerador de Convite QR</title>
<link rel="icon" href="icon-192x192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00bfa5">

<script src="clientes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
/* 👇 RESET PARA GARANTIR QUE OCUPE A TELA TODA */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
    
    /* 👇 AJUSTES PARA FICAR NO TAMANHO CERTO */
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 40px; /* Espaço no topo */
    padding-bottom: 40px;
}

h1{
    font-size: 32px; /* Título maior */
    margin-bottom: 30px;
    color: #000;
}

input, textarea, select{
    width: 90%; /* Mais largo */
    max-width: 550px; /* Limite maior */
    padding: 18px; /* Mais espaçoso */
    margin: 12px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px; /* Fonte maior dentro da caixa */
}

button{
    padding: 18px 35px; /* Botão maior */
    background:#00bfa5;
    color:white;
    border:none;
    border-radius:12px;
    font-size:20px; /* Letra maior no botão */
    cursor:pointer;
    margin:8px;
    width: 85%;
    max-width: 500px;
}

#qrcode{
    margin-top:40px;
    transform: scale(1.1); /* Aumenta um pouco o QR Code */
}

</style>
</head>
<body>

<h1>Gerar Convite QR</h1>

<input id="nomeCliente" placeholder="Digite: joao, maria ou bela">

<textarea id="homenagem" rows="4" placeholder="Escreva uma mensagem ou homenagem especial..."></textarea>

<select id="tema">
<option value="festa">🎉 Festa</option>
<option value="romantico">❤️ Romântico</option>
<option value="natal">🎄 Natal</option>
</select>

<br>

<button onclick="gerar()">Gerar QR Code</button>
<button onclick="baixarQR()">Baixar QR Code</button>

<div id="qrcode"></div>

<script>

function gerar(){

    let nome = document.getElementById("nomeCliente").value.toLowerCase();
    let tema = document.getElementById("tema").value;
    let homenagem = document.getElementById("homenagem").value;

    if(!clientes[nome]){
        alert("Cliente não encontrado! Digite: joao, maria ou bela");
        return;
    }

    let msg = clientes[nome].mensagem;
    let video = clientes[nome].video;

    let baseUrl = "https://cesarjlando-afk.github.io/qrcodeMagic/";
    
    let url = baseUrl + "convite.html?msg=" + 
              encodeURIComponent(msg) + 
              "&homenagem=" + 
              encodeURIComponent(homenagem) + 
              "&video=" + 
              encodeURIComponent(video) + 
              "&tema=" + 
              tema;

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 256,
        height: 256
    });

}

function baixarQR(){
    let img = document.querySelector("#qrcode img");
    if(!img){
        alert("Gere o QR Code primeiro");
        return;
    }
    let link = document.createElement("a");
    link.href = img.src;
    link.download = "convite-qrcode.png";
    link.click();
}

</script>

</body>
</html>
