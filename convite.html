<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Convite Especial</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;

    display:flex;
    flex-direction:column;
    justify-content:flex-start; /* Alinha tudo mais para o topo */
    align-items:center;

    min-height:100vh;
    overflow:hidden;
    padding-top: 50px; /* Espaço no topo */
}

.container{
    text-align:center;
    width:95%;
    max-width:500px;
    padding:10px;
    position:relative;
    z-index:10;
}

/* 👇 TÍTULO BEM GRANDE E DESTAQUE 👇 */
h1{
    font-size:34px; /* Muito maior */
    font-weight:900; /* Bem grossa */
    margin-bottom:10px;
    text-shadow: 0 0 15px #fff, 0 0 25px #00bfa5;
    line-height: 1.2;
}

/* 👇 TEXTO DA HOMENAGEM TAMBÉM GRANDE 👇 */
#homenagem{
    font-size:22px; /* Aumentada */
    font-weight:bold; /* Grossa */
    color:#ffffff;
    line-height:1.4;
    margin-bottom:20px; /* Menos espaço antes do vídeo */
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    min-height:50px;
}

video{
    width:100%;
    max-width: 500px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,0.2);
    aspect-ratio: 9/16; 
    object-fit: cover;
}

/* balões */
.balao{
    position:absolute;
    bottom:-80px;
    width:35px;
    height:45px;
    border-radius:50%;
    animation:subir linear infinite;
}

@keyframes subir{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1 id="mensagem">Carregando...</h1>
    <div id="homenagem"></div>
    <video id="video" autoplay loop muted playsinline></video>
</div>

<script>

const params = new URLSearchParams(window.location.search);

let msg = params.get('msg') || "Mensagem padrão";
let homenagemTexto = params.get('homenagem') || "";
let videoSrc = params.get('video') || "";

document.getElementById("mensagem").innerText = msg;
document.getElementById("homenagem").innerText = homenagemTexto;

if(videoSrc){
    document.getElementById("video").src = videoSrc;
}

// Cria os balões
const cores = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

function criarBalao(){
    const balao = document.createElement("div");
    balao.classList.add("balao");
    
    balao.style.left = Math.random() * 100 + "%";
    balao.style.background = cores[Math.floor(Math.random() * cores.length)];
    balao.style.animationDuration = (Math.random() * 10 + 10) + "s";
    
    document.body.appendChild(balao);
    
    setTimeout(() => {
        balao.remove();
    }, 20000);
}

setInterval(criarBalao, 800);

</script>

</body>
</html>
