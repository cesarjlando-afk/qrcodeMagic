<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Convite Especial</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    max-width:420px;
    padding:20px;
    position:relative;
    z-index:10;
}

h1{
    font-size:26px;
    margin-bottom:20px;
}

video{
    width:100%;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,0.2);
}

/* balões */
.balao{
    position:absolute;
    bottom:-80px;
    width:35px;
    height:45px;
    border-radius:50%;
    animation:subir linear infinite;
}

@keyframes subir{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1 id="mensagem">Carregando...</h1>
    <video id="video" autoplay loop muted playsinline></video>
</div>

<script>

// Pega os dados do link
const params = new URLSearchParams(window.location.search);

let msg = params.get('msg') || "Mensagem padrão";
let videoSrc = params.get('video') || "";

// Coloca na tela
document.getElementById("mensagem").innerText = msg;

// Carrega e toca o vídeo
if(videoSrc){
    document.getElementById("video").src = videoSrc;
}

// Cria os balões
const cores = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

function criarBalao(){
    const balao = document.createElement("div");
    balao.classList.add("balao");
    
    balao.style.left = Math.random() * 100 + "%";
    balao.style.background = cores[Math.floor(Math.random() * cores.length)];
    balao.style.animationDuration = (Math.random() * 10 + 10) + "s";
    
    document.body.appendChild(balao);
    
    setTimeout(() => {
        balao.remove();
    }, 20000);
}

setInterval(criarBalao, 800);

</script>

</body>
</html>
