<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Convite Especial</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
transition:background 1s;
overflow:hidden;
}

h1{
font-size:28px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1;}
}

/* container do video */

.video-container{
position:relative;
width:90%;
max-width:600px;
margin:auto;
padding-top:56.25%;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
border-radius:12px;
}

/* TEMAS */

body.festa{
background:#aee1f9;
}

body.romantico{
background:#ffe4ec;
color:#d81b60;
}

body.natal{
background:#0b3d2e;
color:white;
}

/* ANIMAÇÕES */

.heart{
position:absolute;
color:#ff4d6d;
animation:float 6s infinite;
}

.balloon{
position:absolute;
font-size:40px;
animation:float 8s infinite;
}

.snow{
position:absolute;
color:white;
animation:snow 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

@keyframes snow{
from{transform:translateY(-10vh);}
to{transform:translateY(100vh);}
}

</style>
</head>

<body>

<h1 id="mensagem">🎉 Convite Especial 🎉</h1>

<div class="video-container">
<iframe id="video" allow="autoplay"></iframe>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const msg = params.get("msg");
const video = params.get("video");
const tema = params.get("tema");

/* mensagem */

if(msg){
document.getElementById("mensagem").innerText = msg;
}

/* video */

if(video){

let id = "";

/* extrair ID do drive */

if(video.includes("/d/")){
id = video.split("/d/")[1].split("/")[0];
}

else if(video.includes("id=")){
id = video.split("id=")[1];
}

if(id){

document.getElementById("video").src =
"https://drive.google.com/file/d/" + id + "/preview";

}

}

/* tema */

if(tema){
document.body.classList.add(tema);
animacaoTema(tema);
}

/* animações */

function animacaoTema(tema){

if(tema==="romantico"){

for(let i=0;i<15;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

}

}

if(tema==="festa"){

for(let i=0;i<10;i++){

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"%";

document.body.appendChild(balloon);

}

}

if(tema==="natal"){

for(let i=0;i<30;i++){

let snow=document.createElement("div");

snow.className="snow";

snow.innerHTML="❄";

snow.style.left=Math.random()*100+"%";

document.body.appendChild(snow);

}

}

}

</script>

</body>
</html>
