<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gerador de Convite QR</title>
<link rel="icon" href="icon-192x192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00bfa5">

<script src="clientes.js"></script>
<!-- ✅ VOLTAMOS PARA A BIBLIOTECA QUE FUNCIONAVA -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 40px;
    padding-bottom: 40px;
}

h1{
    font-size: 32px;
    margin-bottom: 30px;
    color: #000;
}

input, textarea, select{
    width: 90%;
    max-width: 550px;
    padding: 18px;
    margin: 12px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
}

button{
    padding: 18px 35px;
    background:#00bfa5;
    color:white;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    margin:8px;
    width: 85%;
    max-width: 500px;
}

#qrcode{
    margin-top:30px;
    transform: scale(0.8);
    background-color: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>
<body>

<h1>Gerar Convite QR</h1>

<input id="nomeCliente" placeholder="Digite: joao, maria, bela, luciana...">

<textarea id="homenagem" rows="4" placeholder="Escreva uma mensagem ou homenagem especial..."></textarea>

<input id="imagemFundo" placeholder="Nome da imagem: ex: imagens/fundo.jpg">

<select id="tema">
<option value="festa">🎉 Festa</option>
<option value="romantico">❤️ Romântico</option>
<option value="natal">🎄 Natal</option>
</select>

<br>

<button onclick="gerar()">Gerar QR Code</button>
<button onclick="baixarQR()">Baixar QR Code</button>

<div id="qrcode"></div>

<script>

let urlDoQRCode;

function gerar(){

    let nome = document.getElementById("nomeCliente").value.toLowerCase();
    let tema = document.getElementById("tema").value;
    let homenagem = document.getElementById("homenagem").value;
    let imagem = document.getElementById("imagemFundo").value;

    if(!clientes[nome]){
        alert("Cliente não encontrado! Digite: joao, maria, bela, luciana...");
        return;
    }

    let msg = clientes[nome].mensagem;
    let video = clientes[nome].video;

    let baseUrl = "https://cesarjlando-afk.github.io/qrcodeMagic/";
    
    urlDoQRCode = baseUrl + "convite.html?msg=" + 
              encodeURIComponent(msg) + 
              "&homenagem=" + 
              encodeURIComponent(homenagem) + 
              "&video=" + 
              encodeURIComponent(video) + 
              "&imagem=" + 
              encodeURIComponent(imagem) + 
              "&tema=" + 
              tema;

    document.getElementById("qrcode").innerHTML = "";

    // ✅ ISSO FUNCIONA PERFEITAMENTE
    new QRCode(document.getElementById("qrcode"), {
        text: urlDoQRCode,
        width: 256,
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

}

// ✅ FUNÇÃO DE DOWNLOAD QUE NÃO FALHA
function baixarQR(){
    if(!urlDoQRCode){
        alert("Gere o QR Code primeiro");
        return;
    }

    // Cria uma janela nova só com a imagem
    let janela = window.open('', '_blank', 'width=600,height=600');
    janela.document.write('<html><body style="background:white; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">');
    
    // Cria a imagem na nova janela
    let img = new Image();
    img.style.width = "512px";
    img.style.height = "512px";
    img.style.padding = "40px";
    img.style.background = "white";
    
    // Gera o QR dentro da imagem
    new QRCode(img, {
        text: urlDoQRCode,
        width: 432,
        height: 432,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    janela.document.body.appendChild(img);
    janela.document.write('</body></html>');

    // Instrução simples
    alert("Na nova tela, toque e segure no QR Code e escolha 'Baixar imagem' ou 'Salvar imagem'!");
}

</script>

</body>
</html>
