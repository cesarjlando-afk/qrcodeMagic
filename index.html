<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Convite QR</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

input, textarea, select{
width:85%;
max-width:500px;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 25px;
background:#00bfa5;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin:5px;
}

#qrcode{
margin-top:30px;
}

</style>
</head>

<body>

<h1>Gerar Convite QR</h1>

<textarea id="mensagem" rows="3" placeholder="Digite a mensagem"></textarea>

<input id="video" placeholder="Link do vídeo do Google Drive">

<select id="tema">
<option value="festa">🎉 Festa</option>
<option value="romantico">❤️ Romântico</option>
<option value="natal">🎄 Natal</option>
</select>

<br>

<button onclick="gerar()">Gerar QR Code</button>

<button onclick="baixarQR()">Baixar QR Code</button>

<div id="qrcode"></div>

<script>

function gerar(){

let msg = document.getElementById("mensagem").value;
let video = document.getElementById("video").value;
let tema = document.getElementById("tema").value;

let url =
window.location.origin +
window.location.pathname.replace("index.html","") +
"convite.html?msg=" +
encodeURIComponent(msg) +
"&video=" +
encodeURIComponent(video) +
"&tema=" +
tema;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:url,
width:250,
height:250
});

}

/* baixar qr */

function baixarQR(){

let img = document.querySelector("#qrcode img");

if(!img){
alert("Gere o QR Code primeiro");
return;
}

let link = document.createElement("a");

link.href = img.src;
link.download = "convite-qrcode.png";

link.click();

}

</script>

</body>
</html>
