<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gerador de Convite QR</title>
<link rel="icon" href="icon-192x192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00bfa5">

<script src="clientes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 40px;
    padding-bottom: 40px;
}

h1{
    font-size: 32px;
    margin-bottom: 30px;
    color: #000;
}

input, textarea, select{
    width: 90%;
    max-width: 550px;
    padding: 18px;
    margin: 12px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
}

button{
    padding: 18px 35px;
    background:#00bfa5;
    color:white;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    margin:8px;
    width: 85%;
    max-width: 500px;
}

#qrcode{
    margin-top:40px;
    /* 👇 Aumenta um pouco na tela */
    transform: scale(1.2);
    background-color: white; /* Fundo branco forte */
    padding: 10px; /* Borda branca ao redor */
    border-radius: 10px;
}
</style>
</head>
<body>

<h1>Gerar Convite QR</h1>

<input id="nomeCliente" placeholder="Digite: joao, maria, bela, luciana...">

<textarea id="homenagem" rows="4" placeholder="Escreva uma mensagem ou homenagem especial..."></textarea>

<input id="imagemFundo" placeholder="Nome da imagem: ex: imagens/fundo.jpg">

<select id="tema">
<option value="festa">🎉 Festa</option>
<option value="romantico">❤️ Romântico</option>
<option value="natal">🎄 Natal</option>
</select>

<br>

<button onclick="gerar()">Gerar QR Code</button>
<button onclick="baixarQR()">Baixar QR Code</button>

<div id="qrcode"></div>

<script>

function gerar(){

    let nome = document.getElementById("nomeCliente").value.toLowerCase();
    let tema = document.getElementById("tema").value;
    let homenagem = document.getElementById("homenagem").value;
    let imagem = document.getElementById("imagemFundo").value;

    if(!clientes[nome]){
        alert("Cliente não encontrado! Digite: joao, maria, bela, luciana...");
        return;
    }

    let msg = clientes[nome].mensagem;
    let video = clientes[nome].video;

    let baseUrl = "https://cesarjlando-afk.github.io/qrcodeMagic/";
    
    let url = baseUrl + "convite.html?msg=" + 
              encodeURIComponent(msg) + 
              "&homenagem=" + 
              encodeURIComponent(homenagem) + 
              "&video=" + 
              encodeURIComponent(video) + 
              "&imagem=" + 
              encodeURIComponent(imagem) + 
              "&tema=" + 
              tema;

    document.getElementById("qrcode").innerHTML = "";

    // ✅ AJUSTES PARA MELHORAR A LEITURA
    new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 350,  // 👈 Aumentei o tamanho
        height: 350, // 👈 Aumentei o tamanho
        colorDark : "#000000",  // Preto puro
        colorLight : "#ffffff", // Branco puro
        correctLevel : QRCode.CorrectLevel.H // Nível máximo de correção de erro
    });

}

function baixarQR(){
    let canvas = document.querySelector("#qrcode canvas");
    
    if(!canvas){
        alert("Gere o QR Code primeiro");
        return;
    }
    
    let urlDaImagem = canvas.toDataURL("image/png");
    
    let link = document.createElement("a");
    link.href = urlDaImagem;
    link.download = "convite-qrcode.png";
    link.click();
}

</script>

</body>
</html>
