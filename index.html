<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gerador de Convite QR</title>
<link rel="icon" href="icon-192x192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00bfa5">

<script src="clientes.js"></script>
<!-- ✅ Mudei para uma biblioteca mais confiável -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family:Arial;
    background:#f4f6f8;
    text-align:center;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 40px;
    padding-bottom: 40px;
}

h1{
    font-size: 32px;
    margin-bottom: 30px;
    color: #000;
}

input, textarea, select{
    width: 90%;
    max-width: 550px;
    padding: 18px;
    margin: 12px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
}

button{
    padding: 18px 35px;
    background:#00bfa5;
    color:white;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    margin:8px;
    width: 85%;
    max-width: 500px;
}

#qrcode{
    margin-top:30px;
    transform: scale(0.8);
    background-color: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>
<body>

<h1>Gerar Convite QR</h1>

<input id="nomeCliente" placeholder="Digite: joao, maria, bela, luciana...">

<textarea id="homenagem" rows="4" placeholder="Escreva uma mensagem ou homenagem especial..."></textarea>

<input id="imagemFundo" placeholder="Nome da imagem: ex: imagens/fundo.jpg">

<select id="tema">
<option value="festa">🎉 Festa</option>
<option value="romantico">❤️ Romântico</option>
<option value="natal">🎄 Natal</option>
</select>

<br>

<button onclick="gerar()">Gerar QR Code</button>
<button onclick="baixarQR()">Baixar QR Code</button>

<div id="qrcode"></div>

<script>

let urlDoQRCode;

function gerar(){

    let nome = document.getElementById("nomeCliente").value.toLowerCase();
    let tema = document.getElementById("tema").value;
    let homenagem = document.getElementById("homenagem").value;
    let imagem = document.getElementById("imagemFundo").value;

    if(!clientes[nome]){
        alert("Cliente não encontrado! Digite: joao, maria, bela, luciana...");
        return;
    }

    let msg = clientes[nome].mensagem;
    let video = clientes[nome].video;

    let baseUrl = "https://cesarjlando-afk.github.io/qrcodeMagic/";
    
    urlDoQRCode = baseUrl + "convite.html?msg=" + 
              encodeURIComponent(msg) + 
              "&homenagem=" + 
              encodeURIComponent(homenagem) + 
              "&video=" + 
              encodeURIComponent(video) + 
              "&imagem=" + 
              encodeURIComponent(imagem) + 
              "&tema=" + 
              tema;

    document.getElementById("qrcode").innerHTML = "";

    // ✅ Usando a nova biblioteca para desenhar na tela
    QRCode.toCanvas(document.getElementById("qrcode"), urlDoQRCode, {
        width: 256,
        color: {
            dark: "#000000",
            light: "#ffffff"
        },
        errorCorrectionLevel: 'H'
    }, function (error) {
        if (error) console.error(error);
    });

}

// ✅ FUNÇÃO DE DOWNLOAD 100% IMAGEM
function baixarQR(){
    if(!urlDoQRCode){
        alert("Gere o QR Code primeiro");
        return;
    }

    // Cria um canvas temporário
    let canvas = document.createElement('canvas');
    
    // Gera o QR com margem e tamanho perfeito
    QRCode.toCanvas(canvas, urlDoQRCode, {
        width: 512,
        margin: 2, // Borda branca já inclusa
        color: {
            dark: "#000000",
            light: "#ffffff"
        },
        errorCorrectionLevel: 'H'
    }, function (error) {
        if (error) {
            console.error(error);
            return;
        }
        
        // Converte para imagem e baixa
        let urlDaImagem = canvas.toDataURL("image/png");
        let link = document.createElement("a");
        link.download = "convite-qrcode.png";
        link.href = urlDaImagem;
        link.click();
    });
}

</script>

</body>
</html>
